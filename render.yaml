/**
 * Render Blueprint Specification
 * This file automates the deployment of both Frontend and Backend to Render.
 */
services:
  # --- Backend Web Service ---
  - type: web
    name: echoes-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        fromService:
          type: static
          name: echoes-frontend
          property: url

  # --- Frontend Static Site ---
  - type: static
    name: echoes-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: ./dist
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: echoes-backend
          property: url
          suffix: /api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
